name: Network Readiness

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest hypothesis

      - name: Validate network readiness manifest
        run: python scripts/validate_network_readiness.py

      - name: Run Python tests
        run: pytest -q

      - name: Run Rust tests
        run: cargo test --manifest-path pbt-rs/Cargo.toml

      - name: Build release bundle
        run: bash pbt-rs/scripts/release_bundle.sh

      - name: Verify release artifacts
        run: python scripts/verify_release_artifacts.py

      - name: Upload release bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: network-readiness-bundle
          path: dist/
