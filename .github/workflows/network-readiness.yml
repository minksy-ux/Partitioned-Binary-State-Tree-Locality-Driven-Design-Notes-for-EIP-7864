name: Network Readiness

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  readiness:
    runs-on: ubuntu-latest
    env:
      PBT_RELEASE_MODE: ${{ (github.ref_name == 'main' || github.ref_name == 'master') && '1' || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Validate network readiness manifest
        run: python scripts/validate_network_readiness.py

      - name: Validate release notes policy
        run: python scripts/validate_release_notes.py

      - name: Validate frozen vectors
        run: python scripts/validate_frozen_vectors.py

      - name: Run cross-client conformance
        run: python scripts/run_cross_client_conformance.py

      - name: Generate performance envelopes
        run: python scripts/generate_performance_envelopes.py

      - name: Validate API surface lock
        run: python scripts/validate_api_surface.py

      - name: Validate API release policy
        run: python scripts/validate_api_release_policy.py

      - name: Run rollback drill
        run: python scripts/run_rollback_drill.py

      - name: Run Ruff lint checks
        run: |
          ruff check \
            pbt/hash.py \
            pbt/minimal_verifier.py \
            pbt/nodes.py \
            pbt/stem_subscription.py \
            pbt/tree.py \
            pbt/verified_rpc.py \
            scripts/run_cross_client_conformance.py \
            scripts/validate_frozen_vectors.py \
            scripts/update_vector_checksums.py \
            scripts/validate_api_surface.py \
            scripts/generate_performance_envelopes.py \
            scripts/validate_api_release_policy.py \
            scripts/run_rollback_drill.py \
            scripts/generate_supply_chain_artifacts.py \
            scripts/validate_supply_chain_artifacts.py

      - name: Run Mypy type checks
        run: |
          mypy \
            scripts/run_cross_client_conformance.py \
            scripts/validate_frozen_vectors.py \
            scripts/update_vector_checksums.py \
            scripts/validate_api_surface.py \
            scripts/generate_performance_envelopes.py \
            scripts/validate_api_release_policy.py \
            scripts/run_rollback_drill.py \
            scripts/generate_supply_chain_artifacts.py \
            scripts/validate_supply_chain_artifacts.py \
            --follow-imports=skip

      - name: Run Python tests
        run: pytest -q

      - name: Run Rust tests
        run: cargo test --manifest-path pbt-rs/Cargo.toml

      - name: Build release bundle
        env:
          SUPPLY_CHAIN_SIGNING: "disabled"
          CI: "true"
          RELEASE_BUNDLE_RUN_TESTS: "0"
        run: bash pbt-rs/scripts/release_bundle.sh

      - name: Generate supply chain artifacts
        run: python scripts/generate_supply_chain_artifacts.py

      - name: Validate supply chain artifacts
        env:
          SUPPLY_CHAIN_SIGNING: "disabled"
        run: python scripts/validate_supply_chain_artifacts.py

      - name: Verify release artifacts
        run: python scripts/verify_release_artifacts.py

      - name: Build EF handoff package
        run: python scripts/build_ef_handoff.py

      - name: Upload release bundle artifacts
        uses: actions/upload-artifact@v5
        with:
          name: network-readiness-bundle
          path: dist/

      - name: Upload EF handoff package
        uses: actions/upload-artifact@v5
        with:
          name: ef-handoff-package
          path: |
            dist/ef-handoff/
            dist/ef-handoff-package.tar.gz
